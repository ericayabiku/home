
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erica Correia Yabiku — Contato</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="./css/index.css">
    <link rel="shortcut icon" href="./images/developmenticon.png">
    <style>
.contact-section {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 150px);
    padding: 2rem;
}

.contact-container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
}

/* Cabeçalho da Seção */
.contact-header {
    text-align: left;
    margin-bottom: 4rem;
}

.contact-header h2 {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 2.5rem;
    font-weight: 600;
    color: var(--text-primary, #111111);
    margin-bottom: 1rem;
}

.contact-header p {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text-secondary, #666666);
}

/* Grid de Informações */
.contact-grid {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

/* Cards de Contato Interativos */
.contact-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.8rem 2rem;
    background-color: #FFFFFF;
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid rgba(0, 0, 0, 0.05);
}

.contact-card:not(.no-link):hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
}

/* Labels e Textos Internos */
.contact-label {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted, #999999);
    font-weight: 500;
    width: 25%;
}

.contact-value {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.1rem;
    color: var(--text-primary, #111111);
    font-weight: 400;
    flex: 1;
}

/* Seta Indicativa Metálica */
.contact-arrow {
    font-size: 1.2rem;
    color: var(--text-muted, #999999);
    transition: transform 0.2s ease, color 0.2s ease;
}

.contact-card:hover .contact-arrow {
    transform: translateX(5px);
    color: var(--text-primary, #111111);
}

/* Ajuste para o card de endereço fixo */
.contact-card.no-link {
    background-color: transparent;
    border: 1px dashed rgba(0, 0, 0, 0.15);
}

/* Responsividade para Celulares */
@media screen and (max-width: 600px) {
    .contact-header h2 {
        font-size: 2rem;
    }
    
    .contact-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
        padding: 1.5rem;
    }
    
    .contact-label {
        width: 100%;
    }
    
    .contact-arrow {
        display: none; /* Oculta a seta no mobile para economizar espaço */
    }
}
    </style>
</head>
<body>

    <!-- Cabeçalho de Navegação Simplificado -->
    <header>
        <div class="nav-container">
            <div class="logo">Erica Y.</div>

                    <li><a href="./contato.html" class="active">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>
<main class="contact-section">
    <div class="contact-container">
        <div class="contact-header">
            <h2>Vamos trabalhar juntos?</h2>
         
        </div>
        
        <div class="contact-grid">
            <!-- Bloco de E-mail -->
            <a href="mailto:ericayabiku@outlook.com" class="contact-card">
                <span class="contact-label">E-mail</span>
                <span class="contact-value">ericayabiku@outlook.com</span>
                <span class="contact-arrow">&rarr;</span>
            </a>

            <!-- Bloco do LinkedIn -->
            <a href="https://www.linkedin.com/in/erica-yabiku/" target="_blank" class="contact-card">
                <span class="contact-label">LinkedIn</span>
                <span class="contact-value">Meu LinkedIn</span>
                <span class="contact-arrow">&rarr;</span>
            </a>

            <!-- Bloco de Telefone -->
            <a href="https://wa.me" target="_blank" class="contact-card">
                <span class="contact-label">Telefone / WhatsApp</span>
                <span class="contact-value">(11) 96207-0314</span>
                <span class="contact-arrow">&rarr;</span>
            </a>

            <!-- Bloco de Localização -->
            <div class="contact-card no-link">
                <span class="contact-label">Localização</span>
                <span class="contact-value">São Paulo, SP — Parada Inglesa</span>
            </div>
        </div>
    </div>
</main>
