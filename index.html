<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erica Yabiku — Portfólio</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="shortcut icon" href="./images/developmenticon.png">
    <style>
body {
            background-color: var(--bg-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 90px;
        }


.track{
    display:inline-flex;
    align-items:center;
    gap:50px;
    animation:scroll 20s linear infinite;
    white-space:nowrap;
}

.track span,
.track a{
    color:#fff;
    font-size:64px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:3px;
    text-decoration:none;
}
.text-carousel{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:110px;
    background:#000;
    overflow:hidden;
    z-index:9999;
    display:flex;
    align-items:center;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}
.star{
    position: fixed;
    width: 12px;
    height: 12px;
    background: #000;
    pointer-events: none;
    z-index: 99999;

    clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 100%,
        50% 75%,
        21% 100%,
        32% 57%,
        2% 35%,
        39% 35%
    );

    animation: starMove 1s ease-out forwards;
}


@keyframes starMove{

    0%{
        opacity:1;
        transform:scale(1) rotate(0deg);
    }

    100%{
        opacity:0;
        transform:
        translateY(-50px)
        scale(0)
        rotate(180deg);
    }

}


@keyframes sparkle{

    0%{
        opacity:1;
        transform:scale(1) rotate(45deg);
    }

    100%{
        opacity:0;
        transform:scale(3) rotate(45deg);
    }

}


        /* Responsividade */
        @media screen and (max-width: 950px) {
            .homepage-container {
                padding: 0 3rem;
            }
            .name-title {
                font-size: 72px;
            }
            .projects-trigger {
                font-size: 1.85rem;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                overflow: auto;
            }
            .homepage-container {
                flex-direction: column;
                gap: 3rem;
                padding: 4rem 2rem;
                align-items: flex-start;
                justify-content: flex-start;
                height: 100%;
            }
            .name-title {
                font-size: 54px;
                letter-spacing: -1.5px;
            }
            .nav-links {
                align-items: flex-start;
                padding-top: 0;
            }
        }

        @media screen and (max-width: 480px) {
            .name-title {
                font-size: 42px;
                letter-spacing: -1px;
            }
        }
    </style>
</head>
<body>
    <div class="text-carousel">
  <div class="track">
   <span>ERICA Y.</span>
    <span>•</span>
    <a href="./projetos.html">PROJETOS</a>
    <span>•</span>
    <a href="./sobre.html">SOBRE</a>
    <span>•</span>
     <a href="./contato.html">CONTATO</a>
      <span>•</span>
    

    <!-- Duplicado para criar loop infinito -->
    <span>ERICA Y.</span>
    <span>•</span>
    <a href="./projetos.html">PROJETOS</a>
    <span>•</span>
    <a href="./sobre.html">SOBRE</a>
    <span>•</span>
     <a href="./contato.html">CONTATO</a>
      <span>•</span>
    
  </div>
</div>
<script>
let lastStar = 0;

document.addEventListener("mousemove", createStar);

document.addEventListener("touchmove", function(e){

    const touch = e.touches[0];

    createStar({
        clientX: touch.clientX,
        clientY: touch.clientY
    });

});


function createStar(e){

    const now = Date.now();

    // controla quantidade de estrelas
    if(now - lastStar < 50) return;

    lastStar = now;


    const star = document.createElement("div");
    star.className = "star";


    // posição
    star.style.left = e.clientX + "px";
    star.style.top = e.clientY + "px";


    // tamanho aleatório
    const size = Math.random() * 8 + 4;

    star.style.width = size + "px";
    star.style.height = size + "px";


    // rotação aleatória
    star.style.setProperty(
        "--rotate",
        Math.random() * 180 + "deg"
    );


    document.body.appendChild(star);


    setTimeout(() => {
        star.remove();
    },1000);

}
</script>

        

</body>
</html>
