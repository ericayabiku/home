<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erica Yabiku — Portfólio</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="shortcut icon" href="./images/developmenticon.png">
    <style>
        body {
            background-color: var(--bg-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container Principal do Layout */
        .homepage-container {
            max-width: var(--max-width);
            width: 100%;
            padding: 0 5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        /* Caixa principal que segura os dois elementos */
.bloco-lateral-esquerdo {
    position: absolute;
    top: 40px;         /* Distância do topo da tela */
    left: 40px;        /* Distância da borda esquerda */
    display: flex;
    flex-direction: column; /* Alinha um embaixo do outro verticalmente */
    align-items: flex-start; /* Força o alinhamento total à esquerda */
}

/* Ajuste do Nome */
.bloco-lateral-esquerdo h1 {
    margin: 0;
    padding: 0;
    font-size: 4rem;   /* Mantém o tamanho grande do seu print */
    line-height: 1;    /* Evita espaços vazios fantasmas embaixo da letra */
}

/* Ajuste do Link Projetos */
.bloco-lateral-esquerdo .link-projetos {
    margin-top: 24px;  /* Controla o espaço vertical entre o nome e o link */
    margin-left: 0;    /* Zera qualquer margem antiga que jogava ele pro meio */
    font-size: 1.5rem; /* Ajuste o tamanho da fonte como preferir */
    text-decoration: none; /* Remove o sublinhado se quiser */
    color: #8b0000;    /* Mantém o tom avermelhado atual (ou use #ffffff para testar branco!) */
}

        /* Lateral Esquerda - Nome e Link de Projetos */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;            
            
        }
  
        /* Nome em Helvetica Semibold */
        .name-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 96px;
            font-weight: 600; /* Semibold */
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--text-primary);
            text-transform: none; /* Iniciais maiúsculas apenas */
        }
        .name-title {
    position: absolute;
    top: 40px;      /* Distância do topo da tela */
    left: 40px;     /* Distância da esquerda da tela */
    margin: 0;      /* Remove margens antigas que possam atrapalhar */
    text-align: left; /* Garante o alinhamento do texto para a esquerda */
}

        /* Link de Projetos (Helvetica Light, Grande, Terracota) */
        .projects-trigger {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2.25rem; /* ~36px */
            font-weight: 300; /* Light */
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition-smooth);
            align-self: flex-start;
            position: relative;
            padding-bottom: 0.25rem;
        }

        .projects-trigger::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-primary);
            transition: var(--transition-smooth);
        }

        .projects-trigger:hover {
            color: var(--accent-hover);
            transform: translateX(4px);
        }

        .projects-trigger:hover::after {
            width: 100%;
        }

        /* Lateral Direita - Menu Vertical (Helvetica Light) */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            align-items: flex-end;
            padding-top: 1rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.95rem;
            font-weight: 300; /* Light */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            padding-bottom: 0.25rem;
            transition: var(--transition-smooth);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 2px;
            background-color: var(--text-primary);
            transition: var(--transition-smooth);
        }

        .nav-links a:hover {
            color: var(--text-primary);
            font-weight: 600;
        }

        .nav-links a:hover::after {
            width: 100%;
        }
        .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;   /* Força a largura total da tela */
    height: 100vh;  /* Força a altura total da tela */
    object-fit: cover; /* Faz o vídeo cobrir todo o espaço sem distorcer */
    z-index: -1;    /* Joga o gradiente para trás do texto obrigatoriamente */
    pointer-events: none;
}

        /* Responsividade */
        @media screen and (max-width: 950px) {
            .homepage-container {
                padding: 0 3rem;
            }
            .name-title {
                font-size: 72px;
            }
            .projects-trigger {
                font-size: 1.85rem;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                overflow: auto;
            }
            .homepage-container {
                flex-direction: column;
                gap: 3rem;
                padding: 4rem 2rem;
                align-items: flex-start;
                justify-content: flex-start;
                height: 100%;
            }
            .name-title {
                font-size: 54px;
                letter-spacing: -1.5px;
            }
            .nav-links {
                align-items: flex-start;
                padding-top: 0;
            }
        }

        @media screen and (max-width: 480px) {
            .name-title {
                font-size: 42px;
                letter-spacing: -1px;
            }
        }
    </style>
</head>
<body>
<video autoplay muted loop playsinline class="bg-video">
    <source src="./images/gradientecores.mp4" type="video/mp4">
</video>
    <div class="bloco-lateral-esquerdo">
    <h1>Erica Yabiku</h1>
    <!-- Garanta que o link de projetos esteja aqui dentro, logo abaixo do h1 -->
    <a href="./projetos.html" class="link-projetos">PROJETOS</a>
</div>
        

        <!-- Direita: Menu Vertical de Páginas -->
        <nav class="nav-links">
            <a href="./sobre.html">Sobre</a>
            <a href="./contato.html">Contato</a>
        </nav>
    </div>

</body>
</html>
