<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erica Yabiku — Portfólio</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="shortcut icon" href="./images/developmenticon.png">
    <style>
body {
            background-color: var(--bg-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 90px;
        }


.track{
    display:inline-flex;
    gap:50px;
    animation:scroll 20s linear infinite;
}

.track span,
.track a{
    color:#fff;
    font-size:64px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:3px;
    text-decoration:none;
}
.text-carousel{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 90px;
    background: #000;
    overflow: hidden;
    z-index: 9999;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}


        /* Responsividade */
        @media screen and (max-width: 950px) {
            .homepage-container {
                padding: 0 3rem;
            }
            .name-title {
                font-size: 72px;
            }
            .projects-trigger {
                font-size: 1.85rem;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                overflow: auto;
            }
            .homepage-container {
                flex-direction: column;
                gap: 3rem;
                padding: 4rem 2rem;
                align-items: flex-start;
                justify-content: flex-start;
                height: 100%;
            }
            .name-title {
                font-size: 54px;
                letter-spacing: -1.5px;
            }
            .nav-links {
                align-items: flex-start;
                padding-top: 0;
            }
        }

        @media screen and (max-width: 480px) {
            .name-title {
                font-size: 42px;
                letter-spacing: -1px;
            }
        }
    </style>
</head>
<body>
    <div class="text-carousel">
  <div class="track">
   
    <span>•</span>
    <a href="./projetos.html">PROJETOS</a>
    <span>•</span>
    <a href="./sobre.html">SOBRE</a>
    <span>•</span>
     <a href="./contato.html">CONTATO</a>
    

    <!-- Duplicado para criar loop infinito -->
    
    <span>•</span>
    <a href="./projetos.html">PROJETOS</a>
    <span>•</span>
    <a href="./sobre.html">SOBRE</a>
    <span>•</span>
     <a href="./contato.html">CONTATO</a>
    
  </div>
</div>


        

</body>
</html>
